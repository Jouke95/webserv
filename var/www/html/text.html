<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦆</text></svg>">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tekst — Webserv</title>
	<style>
		:root {
			--bg: #0f0f0f;
			--surface: #1a1a1a;
			--border: #2a2a2a;
			--text: #e8e8e8;
			--muted: #666;
			--accent: #4ade80;
		}

		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			background: var(--bg);
			color: var(--text);
			font-family: 'Courier New', monospace;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.container {
			max-width: 640px;
			width: 100%;
			padding: 2rem;
		}

		.back {
			display: inline-block;
			color: var(--accent);
			text-decoration: none;
			font-size: 0.8rem;
			margin-bottom: 2rem;
		}

		.back:hover { text-decoration: underline; }

		h1 {
			font-size: 1.5rem;
			font-weight: normal;
			margin-bottom: 1.5rem;
			padding-bottom: 1rem;
			border-bottom: 1px solid var(--border);
		}

		p {
			color: #aaa;
			font-size: 0.9rem;
			line-height: 1.8;
			margin-bottom: 1rem;
		}
	</style>
</head>
<body>
	<div class="container">
		<a href="/" class="back">← back</a>
		<h1>text page</h1>
		<p>This is a test page for the webserver. The server is built in C++ as part of the Codam curriculum.</p>
		<p>It supports GET, POST and DELETE requests over HTTP/1.1 using poll-based I/O multiplexing.</p>
	</div>
</body>
</html>
