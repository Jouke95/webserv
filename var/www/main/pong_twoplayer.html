
<canvas id="c" width="600" height="400" style="border:1px solid #222;background:#0d0d0d;display:block;margin:0 auto"></canvas>
<div style="display:flex;gap:80px;justify-content:center;margin:12px 0 4px;font-family:'Courier New',monospace">
  <div style="text-align:center">
    <div style="font-size:0.65rem;color:#444;letter-spacing:1px;text-transform:uppercase">Player 1</div>
    <div style="font-size:2rem;color:#00ff99;font-weight:bold" id="sl">0</div>
  </div>
  <div style="font-size:1.5rem;color:#222;align-self:center">:</div>
  <div style="text-align:center">
    <div style="font-size:0.65rem;color:#444;letter-spacing:1px;text-transform:uppercase">Player 2</div>
    <div style="font-size:2rem;color:#00ff99;font-weight:bold" id="sr">0</div>
  </div>
</div>
<div style="text-align:center;font-family:'Courier New',monospace;font-size:0.75rem;color:#555;letter-spacing:1px;height:20px" id="msg">press space to start</div>
<div style="display:flex;gap:80px;justify-content:center;margin-top:16px;font-family:'Courier New',monospace;font-size:0.7rem;color:#333;letter-spacing:1px">
  <span>W / S — player 1</span>
  <span>↑ / ↓ — player 2</span>
</div>
<script>
const W=600,H=400,PW=10,PH=70,PS=5,BS=8,WIN=7;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let state='idle',sL=0,sR=0,lp,rp,ball,loop;
const keys={};
function reset(d){
  lp={x:20,y:H/2-PH/2};
  rp={x:W-20-PW,y:H/2-PH/2};
  const a=(Math.random()*60-30)*Math.PI/180,sp=4;
  ball={x:W/2,y:H/2,vx:Math.cos(a)*sp*d,vy:Math.sin(a)*sp,sp};
}
function init(){sL=sR=0;upd();reset(1);state='idle';msg('press space to start');draw();}
function start(){if(state==='running')return;state='running';msg('');clearInterval(loop);loop=setInterval(tick,1000/60);}
function tick(){
  if(keys['w']||keys['W'])lp.y=Math.max(0,lp.y-PS);
  if(keys['s']||keys['S'])lp.y=Math.min(H-PH,lp.y+PS);
  if(keys['ArrowUp'])rp.y=Math.max(0,rp.y-PS);
  if(keys['ArrowDown'])rp.y=Math.min(H-PH,rp.y+PS);
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y-BS/2<=0){ball.y=BS/2;ball.vy*=-1;}
  if(ball.y+BS/2>=H){ball.y=H-BS/2;ball.vy*=-1;}
  if(ball.vx<0&&ball.x-BS/2<=lp.x+PW&&ball.x-BS/2>=lp.x&&ball.y>=lp.y&&ball.y<=lp.y+PH){ball.x=lp.x+PW+BS/2;bounce(lp);}
  if(ball.vx>0&&ball.x+BS/2>=rp.x&&ball.x+BS/2<=rp.x+PW&&ball.y>=rp.y&&ball.y<=rp.y+PH){ball.x=rp.x-BS/2;bounce(rp);}
  if(ball.x<0){sR++;upd();checkWin('Player 2')||next(-1);}
  else if(ball.x>W){sL++;upd();checkWin('Player 1')||next(1);}
  draw();
}
function bounce(p){
  const rel=(ball.y-(p.y+PH/2))/(PH/2);
  const a=rel*60*Math.PI/180;
  ball.sp=Math.min(ball.sp+0.3,14);
  ball.vx=Math.cos(a)*ball.sp*(ball.vx>0?-1:1);
  ball.vy=Math.sin(a)*ball.sp;
}
function checkWin(n){
  if(sL>=WIN||sR>=WIN){clearInterval(loop);state='idle';msg(n+' wins!  space to restart',true);draw();return true;}
  return false;
}
function next(d){clearInterval(loop);state='idle';reset(d);draw();msg('press space to continue');}
function draw(){
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([8,8]);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#00ff99';
  ctx.beginPath();ctx.roundRect(lp.x,lp.y,PW,PH,3);ctx.fill();
  ctx.beginPath();ctx.roundRect(rp.x,rp.y,PW,PH,3);ctx.fill();
  for(let i=4;i>=1;i--){
    ctx.fillStyle=`rgba(255,255,255,${0.04*i})`;
    const s=BS-i/2;
    ctx.beginPath();ctx.roundRect(ball.x-ball.vx*i-s/2,ball.y-ball.vy*i-s/2,s,s,2);ctx.fill();
  }
  ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(ball.x-BS/2,ball.y-BS/2,BS,BS,2);ctx.fill();
}
function upd(){document.getElementById('sl').textContent=sL;document.getElementById('sr').textContent=sR;}
function msg(t,h=false){const e=document.getElementById('msg');e.textContent=t;e.style.color=h?'#00ff99':'#555';}
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();if(state==='idle')start();}
  if(['ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
init();
</script>
