<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Webserv — Site 2</title>
	<style>
		:root {
			--bg: #0a0f1a;
			--surface: #111827;
			--border: #1e2d40;
			--text: #e8e8e8;
			--muted: #4a6080;
			--accent: #38bdf8;
		}

		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			background: var(--bg);
			color: var(--text);
			font-family: 'Courier New', monospace;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.container {
			max-width: 640px;
			width: 100%;
			padding: 2rem;
		}

		.badge {
			display: inline-block;
			background: var(--accent);
			color: #0a0f1a;
			font-size: 0.65rem;
			font-weight: bold;
			padding: 2px 8px;
			letter-spacing: 0.1em;
			margin-bottom: 2rem;
		}

		h1 {
			font-size: 2rem;
			font-weight: normal;
			letter-spacing: -0.02em;
			margin-bottom: 0.5rem;
		}

		.subtitle {
			color: var(--muted);
			font-size: 0.85rem;
			margin-bottom: 3rem;
		}

		.links {
			display: flex;
			flex-direction: column;
			gap: 1px;
			background: var(--border);
			border: 1px solid var(--border);
		}

		.link-item {
			display: flex;
			align-items: center;
			gap: 1rem;
			padding: 0.875rem 1rem;
			background: var(--surface);
			text-decoration: none;
			color: var(--text);
			transition: background 0.1s;
		}

		.link-item:hover { background: var(--border); }

		.link-item .arrow { color: var(--accent); font-size: 0.75rem; }
		.link-item .name { flex: 1; font-size: 0.9rem; }
		.link-item .desc { color: var(--muted); font-size: 0.75rem; }

		footer {
			margin-top: 3rem;
			color: var(--muted);
			font-size: 0.7rem;
			display: flex;
			justify-content: space-between;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="badge">HTTP/1.1</div>
		<h1>webserv</h1>
		<p class="subtitle">server 2 — port 8081</p>

		<div class="links">
			<a href="/" class="link-item">
				<span class="arrow">→</span>
				<span class="name">/</span>
				<span class="desc">home</span>
			</a>
		</div>

		<footer>
			<span>webserv/1.0</span>
			<span>localhost:8081</span>
		</footer>
	</div>
</body>
</html>
