<!DOCTYPE html>
<html lang="nl">
<head>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🆘</text></svg>">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>500 Internal Server Error — Webserv</title>
	<style>
		:root {
			--bg: #0f0f0f;
			--surface: #1a1a1a;
			--border: #2a2a2a;
			--text: #e8e8e8;
			--muted: #666;
			--accent: #4ade80;
			--error: #f87171;
		}
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			background: var(--bg);
			color: var(--text);
			font-family: 'Courier New', monospace;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.container {
			max-width: 640px;
			width: 100%;
			padding: 2rem;
		}
		.code {
			font-size: 5rem;
			font-weight: bold;
			color: var(--error);
			line-height: 1;
			margin-bottom: 1rem;
			opacity: 0.8;
		}
		h1 {
			font-size: 1.25rem;
			font-weight: normal;
			margin-bottom: 0.75rem;
		}
		p {
			color: var(--muted);
			font-size: 0.85rem;
			margin-bottom: 2rem;
		}
		.back {
			display: inline-block;
			color: var(--accent);
			text-decoration: none;
			font-size: 0.8rem;
			border: 1px solid var(--accent);
			padding: 0.4rem 1rem;
		}
		.back:hover { background: var(--accent); color: #0f0f0f; }
	</style>
</head>
<body>
	<div class="container">
		<div class="code">500</div>
		<h1>Internal Server Error</h1>
		<p>Er is iets misgegaan aan de kant van de server.</p>
		<a href="/" class="back">← home</a>
	</div>
</body>
</html>
