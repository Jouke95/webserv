server {
	host			127.0.0.1;
	port			8080;
	max_body_size	10000000;

	error_page		404 /errors/404.html;
	error_page		500 /errors/500.html;

	location / {
		methods		GET POST PUT DELETE;
		root		var/www/html;
		index		index.html;
		autoindex	off;
	}
	location /upload {
		methods			GET POST PUT DELETE;
		root			var/www/html;
		autoindex		off;
		uploade_store	var/www/uploads;
	}
	location /cgi-bin {
		methods		GET POST;
		root		var/www/cgi-bin;
		cgi			.php /usr/bin/php-cgi;
	}
	location /old-page {
		redirect	303 /new-page;
	}

